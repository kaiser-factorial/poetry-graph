<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Graph — Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.180.0",
        "three/webgpu": "https://esm.sh/three@0.180.0/webgpu",
        "three/tsl": "https://esm.sh/three@0.180.0/tsl",
        "three/addons/": "https://esm.sh/three@0.180.0/examples/jsm/",
        "three/examples/jsm/": "https://esm.sh/three@0.180.0/examples/jsm/"
      }
    }
    </script>
    <style>
        :root {
            --ink: #0c0b10;
            --surface: rgba(20, 19, 26, 0.88);
            --bone: #e8e2d3;
            --muted: #8f897c;
            --brass: #b39554;
            --hairline: rgba(232, 226, 211, 0.14);
            --hairline-strong: rgba(232, 226, 211, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--ink);
            color: var(--bone);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            border-bottom: 1px solid var(--hairline);
            padding: 14px 24px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            z-index: 10;
            background: var(--ink);
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55em;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        header h1 .sub {
            color: var(--muted);
            font-style: italic;
            font-weight: 500;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            transition: color 0.2s;
        }

        header a:hover { color: var(--bone); }

        .toolbar { display: flex; align-items: baseline; gap: 22px; }

        .mode-toggle { display: flex; gap: 18px; }

        .mode-toggle button {
            border: none;
            background: transparent;
            color: var(--muted);
            padding: 2px 0 5px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            border-bottom: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .mode-toggle button.active {
            color: var(--bone);
            border-bottom-color: var(--brass);
        }

        .mode-toggle button:hover { color: var(--bone); }

        .toolbar .button {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--hairline);
            padding: 6px 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            transition: all 0.25s ease;
        }

        .toolbar .button:hover { color: var(--bone); border-color: var(--hairline-strong); }

        .toolbar .button.primary {
            color: var(--brass);
            border-color: rgba(179, 149, 84, 0.55);
        }

        .toolbar .button.primary:hover { color: #d4b877; border-color: var(--brass); }

        main { flex: 1; position: relative; overflow: hidden; }

        #graph3d { width: 100%; height: 100%; }

        /* Side panel */
        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            max-height: calc(100% - 40px);
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--hairline);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 5;
        }

        .panel-header {
            padding: 14px 18px 12px;
            border-bottom: 1px solid var(--hairline);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .panel-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25em;
            font-weight: 500;
            font-style: italic;
        }

        .panel-close {
            border: none;
            background: transparent;
            font-size: 0.95em;
            cursor: pointer;
            color: var(--muted);
        }

        .panel-close:hover { color: var(--bone); }

        .panel-body { padding: 16px 18px; overflow-y: auto; }

        .panel-body h3 {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--muted);
            margin: 16px 0 8px;
            font-weight: 500;
        }

        .panel-body h3:first-child { margin-top: 0; }

        .add-input { display: flex; gap: 8px; }

        .add-input input {
            flex: 1;
            padding: 8px 10px;
            background: transparent;
            border: 1px solid var(--hairline-strong);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: var(--bone);
        }

        .add-input input:focus { outline: none; border-color: var(--brass); }
        .add-input input::placeholder { color: var(--muted); font-style: italic; }

        .add-input button {
            background: transparent;
            border: 1px solid var(--hairline-strong);
            color: var(--bone);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .add-input button:hover { border-color: var(--brass); color: var(--brass); }

        .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }

        .chip {
            background: transparent;
            border: 1px solid var(--hairline);
            color: var(--bone);
            padding: 3px 11px 4px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .chip:hover { border-color: var(--brass); color: var(--brass); }

        .chip.member { border-color: rgba(179, 149, 84, 0.55); color: var(--brass); }
        .chip.member .x { margin-left: 6px; opacity: 0.5; font-size: 0.8em; }
        .chip.member:hover { border-color: #a05555; color: #c98080; }

        .chip .meta {
            opacity: 0.5;
            font-size: 0.72em;
            margin-left: 4px;
            font-family: 'Inter', sans-serif;
        }

        .muted { color: var(--muted); font-size: 0.82em; font-style: italic; }

        /* Forces panel */
        .forces {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 270px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--hairline);
            padding: 14px 16px;
            z-index: 5;
        }

        .forces h3 {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .force-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            font-size: 0.78rem;
        }

        .force-row.disabled { opacity: 0.32; pointer-events: none; }

        .force-row .swatch {
            width: 16px;
            height: 1px;
            flex-shrink: 0;
        }

        .force-row label {
            width: 96px;
            flex-shrink: 0;
            white-space: nowrap;
            color: var(--bone);
            font-size: 0.72rem;
            letter-spacing: 0.02em;
        }

        .force-row label .mark { color: var(--muted); font-size: 0.85em; }

        .force-row input[type="range"] {
            flex: 1;
            accent-color: var(--brass);
            height: 2px;
        }

        .force-row input[type="checkbox"] { accent-color: var(--brass); }

        .force-row.alt-row {
            margin-top: 12px;
            padding-top: 11px;
            border-top: 1px solid var(--hairline);
        }

        .forces .hint {
            font-size: 0.64rem;
            color: var(--muted);
            margin-top: 10px;
            line-height: 1.5;
        }

        /* Draft drawer */
        .draft {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 360px;
            height: 300px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--hairline);
            display: flex;
            flex-direction: column;
            z-index: 6;
        }

        .draft-header {
            padding: 11px 16px 9px;
            border-bottom: 1px solid var(--hairline);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .draft-header h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            font-weight: 500;
            font-style: italic;
        }

        .draft-note {
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-left: 8px;
        }

        .draft-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .draft-gutter {
            width: 34px;
            flex-shrink: 0;
            overflow: hidden;
            text-align: right;
            padding: 12px 8px 12px 0;
            border-right: 1px solid var(--hairline);
            color: var(--brass);
            font-size: 0.68rem;
        }

        .draft-gutter div {
            line-height: 1.75;
            font-size: 0.68rem;
            height: calc(1.05rem * 1.75);
        }

        .draft-body textarea {
            flex: 1;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            color: var(--bone);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            line-height: 1.75;
            padding: 12px 14px;
        }

        .draft-body textarea::placeholder { color: var(--muted); font-style: italic; }
    </style>
</head>
<body>
    <header>
        <h1>Poetry Graph <span class="sub">— workspace</span></h1>
        <div class="toolbar">
            <div class="mode-toggle" id="modeToggle">
                <button data-mode="rhyme" class="active">Rhyme</button>
                <button data-mode="alliteration">Alliteration</button>
            </div>
            <button class="button primary" id="addWordBtn">＋ Add Word</button>
            <button class="button" id="draftBtn">Draft</button>
            <button class="button" id="newPoemBtn">New Poem</button>
            <a href="forms.html">Forms</a>
            <a href="index.html">Explorer</a>
        </div>
    </header>

    <main>
        <div id="graph3d"></div>

        <div class="panel" id="panel" style="display: none;">
            <div class="panel-header">
                <h2 id="panelTitle">Add a word</h2>
                <button class="panel-close" id="panelClose">✕</button>
            </div>
            <div class="panel-body" id="panelBody"></div>
        </div>

        <div class="forces" id="forces" style="display: none;">
            <h3>Connection Forces</h3>
            <div id="forceRows"></div>
            <div class="hint">Sliders set how strongly each relationship pulls words together. Drag words · scroll to zoom · right-drag to pan.</div>
        </div>

        <div class="draft" id="draft" style="display: none;">
            <div class="draft-header">
                <h3>Draft <span class="draft-note">syllables count themselves</span></h3>
                <button class="panel-close" id="draftClose">✕</button>
            </div>
            <div class="draft-body">
                <div class="draft-gutter" id="draftGutter"></div>
                <textarea id="draftText" placeholder="write here…" spellcheck="false"></textarea>
            </div>
        </div>
    </main>

    <script type="module" src="workspace.js?v=7"></script>
</body>
</html>
