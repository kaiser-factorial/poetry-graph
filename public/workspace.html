<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Graph — Poem Workspace</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.180.0",
        "three/webgpu": "https://esm.sh/three@0.180.0/webgpu",
        "three/tsl": "https://esm.sh/three@0.180.0/tsl",
        "three/addons/": "https://esm.sh/three@0.180.0/examples/jsm/",
        "three/examples/jsm/": "https://esm.sh/three@0.180.0/examples/jsm/"
      }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #14102b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            z-index: 10;
        }

        header h1 { font-size: 1.4em; font-weight: 600; }
        header a { color: white; opacity: 0.7; text-decoration: none; font-size: 0.9em; }
        header a:hover { opacity: 1; }

        .toolbar { display: flex; align-items: center; gap: 12px; }

        .mode-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3px;
        }

        .mode-toggle button {
            border: none;
            background: transparent;
            color: white;
            padding: 7px 16px;
            border-radius: 17px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.25s ease;
        }

        .mode-toggle button.active {
            background: #8b7ff0;
            color: white;
            font-weight: 600;
        }

        .toolbar .button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 7px 14px;
            border-radius: 17px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.25s ease;
        }

        .toolbar .button:hover { background: rgba(255, 255, 255, 0.22); }

        main { flex: 1; position: relative; overflow: hidden; }

        #graph3d { width: 100%; height: 100%; }

        /* Side panel */
        .panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 300px;
            max-height: calc(100% - 32px);
            background: rgba(24, 19, 48, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #e8e5ff;
            z-index: 5;
        }

        .panel-header {
            padding: 14px 16px;
            background: rgba(139, 127, 240, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 { font-size: 1.05em; color: #b7aefc; }

        .panel-close {
            border: none;
            background: transparent;
            font-size: 1.1em;
            cursor: pointer;
            color: #9a93c9;
        }

        .panel-body { padding: 14px 16px; overflow-y: auto; }

        .panel-body h3 {
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b7ff0;
            margin: 14px 0 7px;
        }

        .panel-body h3:first-child { margin-top: 0; }

        .add-input { display: flex; gap: 6px; }

        .add-input input {
            flex: 1;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(139, 127, 240, 0.6);
            border-radius: 6px;
            font-size: 0.95em;
            color: white;
        }

        .add-input input::placeholder { color: #8d86bb; }

        .add-input button {
            background: #8b7ff0;
            border: none;
            color: white;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }

        .chip {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #d9d5f5;
            border-radius: 14px;
            padding: 4px 10px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .chip:hover { background: #8b7ff0; color: white; }

        .chip.member { background: rgba(255, 205, 100, 0.2); border-color: rgba(255, 205, 100, 0.5); color: #ffd76e; }
        .chip.member .x { margin-left: 5px; opacity: 0.6; font-weight: bold; }
        .chip.member:hover { background: rgba(224, 101, 101, 0.7); border-color: #c94f4f; color: white; }

        .chip .meta { opacity: 0.55; font-size: 0.85em; margin-left: 4px; }

        .muted { color: #79719f; font-size: 0.85em; font-style: italic; }

        /* Forces panel */
        .forces {
            position: absolute;
            left: 16px;
            bottom: 16px;
            width: 274px;
            background: rgba(24, 19, 48, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 12px 14px;
            color: #e8e5ff;
            z-index: 5;
        }

        .forces h3 {
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b7ff0;
            margin-bottom: 10px;
        }

        .force-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 7px 0;
            font-size: 0.82em;
        }

        .force-row.disabled { opacity: 0.35; pointer-events: none; }

        .force-row .swatch {
            width: 14px;
            height: 3px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .force-row label { width: 92px; flex-shrink: 0; white-space: nowrap; }

        .force-row input[type="range"] {
            flex: 1;
            accent-color: #8b7ff0;
            height: 3px;
        }

        .force-row input[type="checkbox"] { accent-color: #ff9ff5; }

        .force-row.alt-row {
            margin-top: 10px;
            padding-top: 9px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .forces .hint {
            font-size: 0.7em;
            color: #79719f;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <header>
        <h1>✍️ Poem Workspace</h1>
        <div class="toolbar">
            <div class="mode-toggle" id="modeToggle">
                <button data-mode="rhyme" class="active">🎵 Rhyme</button>
                <button data-mode="alliteration">🅰️ Alliteration</button>
            </div>
            <button class="button" id="newPoemBtn">＋ New Poem</button>
            <a href="index.html">← Explorer</a>
        </div>
    </header>

    <main>
        <div id="graph3d"></div>

        <div class="panel" id="panel" style="display: none;">
            <div class="panel-header">
                <h2 id="panelTitle">Add a word</h2>
                <button class="panel-close" id="panelClose">✕</button>
            </div>
            <div class="panel-body" id="panelBody"></div>
        </div>

        <div class="forces" id="forces" style="display: none;">
            <h3>Connection forces</h3>
            <div id="forceRows"></div>
            <div class="hint">Drag sliders to control how strongly each relationship pulls words together. Drag spheres · scroll to zoom · right-drag to pan.</div>
        </div>
    </main>

    <script type="module" src="workspace.js?v=5"></script>
</body>
</html>
