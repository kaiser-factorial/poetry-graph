<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Graph — Poem Workspace</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        header h1 { font-size: 1.4em; }
        header a { color: white; opacity: 0.8; text-decoration: none; font-size: 0.9em; }
        header a:hover { opacity: 1; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 3px;
        }

        .mode-toggle button {
            border: none;
            background: transparent;
            color: white;
            padding: 7px 16px;
            border-radius: 17px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.25s ease;
        }

        .mode-toggle button.active {
            background: white;
            color: #667eea;
            font-weight: 600;
        }

        .toolbar .button {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 7px 14px;
            border-radius: 17px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.25s ease;
        }

        .toolbar .button:hover { background: rgba(255, 255, 255, 0.3); }

        main { flex: 1; position: relative; overflow: hidden; }

        #canvas { width: 100%; height: 100%; display: block; cursor: grab; }
        #canvas:active { cursor: grabbing; }

        /* Graph elements */
        .hub-node {
            fill: rgba(255, 255, 255, 0.92);
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 2px;
            cursor: pointer;
        }

        .hub-node.selected { stroke: #ffd700; stroke-width: 3.5px; }

        .hub-label {
            font-weight: 700;
            fill: #667eea;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            font-size: 15px;
        }

        .word-node {
            fill: #ffd76e;
            stroke: white;
            stroke-width: 1.5px;
            cursor: pointer;
        }

        .word-node:hover { stroke-width: 3px; }

        .word-label {
            fill: white;
            font-size: 13px;
            pointer-events: none;
            text-anchor: middle;
        }

        .plus-node {
            fill: rgba(255, 255, 255, 0.25);
            stroke: white;
            stroke-dasharray: 6 4;
            stroke-width: 2px;
            cursor: pointer;
            transition: fill 0.2s ease;
        }

        .plus-node:hover { fill: rgba(255, 255, 255, 0.45); }

        .plus-label {
            fill: white;
            font-size: 26px;
            font-weight: 300;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        .plus-hint {
            fill: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            text-anchor: middle;
            pointer-events: none;
        }

        .member-link {
            stroke: rgba(255, 255, 255, 0.55);
            stroke-width: 1.5px;
        }

        /* cross-links: the inactive relationship */
        .cross-link.thin {
            stroke: rgba(255, 255, 255, 0.35);
            stroke-width: 1px;
            stroke-dasharray: 3 4;
        }

        .cross-link.thick {
            stroke: rgba(255, 215, 110, 0.55);
            stroke-width: 2.5px;
        }

        /* Side panel */
        .panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 300px;
            max-height: calc(100% - 32px);
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 16px;
            background: #f0f2ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 { font-size: 1.1em; color: #667eea; }

        .panel-close {
            border: none;
            background: transparent;
            font-size: 1.2em;
            cursor: pointer;
            color: #999;
        }

        .panel-body { padding: 14px 16px; overflow-y: auto; }

        .panel-body h3 {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #764ba2;
            margin: 12px 0 6px;
        }

        .panel-body h3:first-child { margin-top: 0; }

        .add-input {
            display: flex;
            gap: 6px;
        }

        .add-input input {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .add-input button {
            background: #667eea;
            border: none;
            color: white;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }

        .chip {
            background: #f0f2ff;
            border: 1px solid #dfe3ff;
            color: #444;
            border-radius: 14px;
            padding: 4px 10px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .chip:hover { background: #667eea; color: white; }

        .chip.member { background: #ffd76e; border-color: #eec658; color: #5a4500; }

        .chip.member .x { margin-left: 5px; opacity: 0.6; font-weight: bold; }
        .chip.member:hover { background: #e06565; border-color: #c94f4f; color: white; }

        .muted { color: #999; font-size: 0.85em; font-style: italic; }

        .legend {
            position: absolute;
            left: 16px;
            bottom: 14px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.8em;
            background: rgba(0, 0, 0, 0.25);
            padding: 8px 12px;
            border-radius: 8px;
            line-height: 1.7;
        }

        .legend .swatch {
            display: inline-block;
            width: 22px;
            height: 0;
            margin-right: 6px;
            vertical-align: middle;
        }

        .swatch.member-s { border-top: 1.5px solid rgba(255, 255, 255, 0.8); }
        .swatch.thin-s { border-top: 1px dashed rgba(255, 255, 255, 0.6); }
        .swatch.thick-s { border-top: 2.5px solid rgba(255, 215, 110, 0.9); }
    </style>
</head>
<body>
    <header>
        <h1>✍️ Poem Workspace</h1>
        <div class="toolbar">
            <div class="mode-toggle" id="modeToggle">
                <button data-mode="rhyme" class="active">🎵 Rhyme</button>
                <button data-mode="alliteration">🅰️ Alliteration</button>
            </div>
            <button class="button" id="newPoemBtn">＋ New Poem</button>
            <a href="index.html">← Explorer</a>
        </div>
    </header>

    <main>
        <svg id="canvas"></svg>

        <div class="panel" id="panel" style="display: none;">
            <div class="panel-header">
                <h2 id="panelTitle">Add a word</h2>
                <button class="panel-close" id="panelClose">✕</button>
            </div>
            <div class="panel-body" id="panelBody"></div>
        </div>

        <div class="legend" id="legend"></div>
    </main>

    <script src="workspace.js"></script>
</body>
</html>
