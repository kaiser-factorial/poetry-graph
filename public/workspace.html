<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Graph — Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.180.0",
        "three/webgpu": "https://esm.sh/three@0.180.0/webgpu",
        "three/tsl": "https://esm.sh/three@0.180.0/tsl",
        "three/addons/": "https://esm.sh/three@0.180.0/examples/jsm/",
        "three/examples/jsm/": "https://esm.sh/three@0.180.0/examples/jsm/"
      }
    }
    </script>
    <style>
        :root {
            --ink: #0c0b10;
            --surface: rgba(20, 19, 26, 0.88);
            --bone: #e8e2d3;
            --muted: #8f897c;
            --brass: #b39554;
            --hairline: rgba(232, 226, 211, 0.14);
            --hairline-strong: rgba(232, 226, 211, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--ink);
            color: var(--bone);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            border-bottom: 1px solid var(--hairline);
            padding: 14px 24px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            z-index: 10;
            background: var(--ink);
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55em;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        header h1 .sub {
            color: var(--muted);
            font-style: italic;
            font-weight: 500;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            transition: color 0.2s;
        }

        header a:hover { color: var(--bone); }

        .toolbar { display: flex; align-items: baseline; gap: 22px; }

        .mode-toggle { display: flex; gap: 18px; }

        .mode-toggle button {
            border: none;
            background: transparent;
            color: var(--muted);
            padding: 2px 0 5px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            border-bottom: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .mode-toggle button.active {
            color: var(--bone);
            border-bottom-color: var(--brass);
        }

        .mode-toggle button:hover { color: var(--bone); }

        .toolbar .button {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--hairline);
            padding: 6px 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            transition: all 0.25s ease;
        }

        .toolbar .button:hover {
            color: var(--bone);
            border-color: var(--hairline-strong);
            transform: translateY(-1px);
        }

        .toolbar .button.primary {
            color: var(--brass);
            border-color: rgba(179, 149, 84, 0.55);
        }

        .toolbar .button.primary:hover { color: #d4b877; border-color: var(--brass); }

        main { flex: 1; position: relative; overflow: hidden; }

        #graph3d { width: 100%; height: 100%; }

        /* Side panel */
        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            max-height: calc(100% - 40px);
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--hairline);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 5;
        }

        .panel-header {
            padding: 14px 18px 12px;
            border-bottom: 1px solid var(--hairline);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .panel-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25em;
            font-weight: 500;
            font-style: italic;
        }

        .panel-close {
            border: none;
            background: transparent;
            font-size: 0.95em;
            cursor: pointer;
            color: var(--muted);
            transition: color 0.2s, transform 0.2s;
        }

        .panel-close:hover { transform: scale(1.2); }

        .panel-close:hover { color: var(--bone); }

        /* Draggable + collapsible panels */
        .drag-handle { cursor: grab; user-select: none; }
        .drag-handle:active { cursor: grabbing; }

        .panel, .forces, .draft {
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .panel:hover, .forces:hover, .draft:hover {
            border-color: var(--hairline-strong);
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.5);
        }

        .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            background:
                linear-gradient(135deg, transparent 55%, rgba(232, 226, 211, 0.35) 55%, rgba(232, 226, 211, 0.35) 62%, transparent 62%,
                    transparent 72%, rgba(232, 226, 211, 0.35) 72%, rgba(232, 226, 211, 0.35) 79%, transparent 79%);
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .resize-handle:hover { opacity: 1; }
        .collapsed .resize-handle { display: none; }

        .header-btns { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

        .collapse-btn {
            border: none;
            background: transparent;
            font-size: 1em;
            cursor: pointer;
            color: var(--muted);
            padding: 0 5px;
            line-height: 1;
        }

        .collapse-btn { transition: color 0.2s, transform 0.2s; }
        .collapse-btn:hover { color: var(--bone); transform: scale(1.2); }

        .panel.collapsed .panel-body { display: none; }
        .panel.collapsed { max-height: none; }

        .forces-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .forces-header h3 { margin-bottom: 0; }
        .forces:not(.collapsed) .forces-header { margin-bottom: 12px; }
        .forces.collapsed #forceRows,
        .forces.collapsed .hint { display: none; }

        .draft.collapsed { height: auto !important; }
        .draft.collapsed .draft-body,
        .draft.collapsed .template-wrap { display: none !important; }

        .panel-body { padding: 16px 18px; overflow-y: auto; }

        .panel-body h3 {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--muted);
            margin: 16px 0 8px;
            font-weight: 500;
        }

        .panel-body h3:first-child { margin-top: 0; }

        .add-input { display: flex; gap: 8px; }

        .add-input input {
            flex: 1;
            padding: 8px 10px;
            background: transparent;
            border: 1px solid var(--hairline-strong);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: var(--bone);
        }

        .add-input input:focus { outline: none; border-color: var(--brass); }
        .add-input input::placeholder { color: var(--muted); font-style: italic; }

        .add-input button {
            background: transparent;
            border: 1px solid var(--hairline-strong);
            color: var(--bone);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .add-input button { transition: all 0.2s ease; }
        .add-input button:hover { border-color: var(--brass); color: var(--brass); transform: translateY(-1px); }

        .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }

        .chip {
            background: transparent;
            border: 1px solid var(--hairline);
            color: var(--bone);
            padding: 3px 11px 4px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .chip:hover {
            border-color: var(--brass);
            color: var(--brass);
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
        }

        .chip.member { border-color: rgba(179, 149, 84, 0.55); color: var(--brass); }
        .chip.member .x { margin-left: 6px; opacity: 0.5; font-size: 0.8em; }
        .chip.member:hover { border-color: #a05555; color: #c98080; }

        .chip .meta {
            opacity: 0.5;
            font-size: 0.72em;
            margin-left: 4px;
            font-family: 'Inter', sans-serif;
        }

        .muted { color: var(--muted); font-size: 0.82em; font-style: italic; }

        /* Forces panel */
        .forces {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 270px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--hairline);
            padding: 14px 16px;
            z-index: 5;
        }

        .forces h3 {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .force-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            font-size: 0.78rem;
        }

        .force-row.disabled { opacity: 0.32; pointer-events: none; }

        .force-row .swatch {
            width: 16px;
            height: 1px;
            flex-shrink: 0;
        }

        .force-row label {
            width: 96px;
            flex-shrink: 0;
            white-space: nowrap;
            color: var(--bone);
            font-size: 0.72rem;
            letter-spacing: 0.02em;
        }

        .force-row label .mark { color: var(--muted); font-size: 0.85em; }

        .force-row input[type="range"] {
            flex: 1;
            accent-color: var(--brass);
            height: 2px;
        }

        .force-row input[type="checkbox"] { accent-color: var(--brass); }

        .force-row.alt-row {
            margin-top: 12px;
            padding-top: 11px;
            border-top: 1px solid var(--hairline);
        }

        .force-row.cam-row { margin-top: 8px; }
        .force-row.cam-row label { width: 68px; color: var(--muted); }

        .cam-btns { display: flex; gap: 5px; flex-wrap: wrap; }

        .cam-btns button {
            background: transparent;
            border: 1px solid var(--hairline);
            color: var(--muted);
            padding: 2px 9px;
            cursor: pointer;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.2s ease;
        }

        .cam-btns button:hover { color: var(--bone); border-color: var(--hairline-strong); }
        .cam-btns button.on { color: var(--brass); border-color: rgba(179, 149, 84, 0.55); }

        .forces .hint {
            font-size: 0.64rem;
            color: var(--muted);
            margin-top: 10px;
            line-height: 1.5;
        }

        /* Draft drawer */
        .draft {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 360px;
            height: 300px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--hairline);
            display: flex;
            flex-direction: column;
            z-index: 6;
        }

        .draft-header {
            padding: 11px 16px 9px;
            border-bottom: 1px solid var(--hairline);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .draft-header h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            font-weight: 500;
            font-style: italic;
        }

        .draft-note {
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-left: 8px;
        }

        .draft-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .draft-gutter {
            width: 74px;
            flex-shrink: 0;
            overflow: hidden;
            text-align: right;
            padding: 12px 8px 12px 0;
            border-right: 1px solid var(--hairline);
            color: var(--brass);
            font-size: 0.68rem;
        }

        .draft-gutter div {
            line-height: 1.75;
            font-size: 0.68rem;
            height: calc(1.05rem * 1.75);
            white-space: nowrap;
        }

        .draft-gutter .aq {
            color: #b0705c;
            margin-left: 7px;
            opacity: 0.85;
        }

        .draft-gutter .aq-zone {
            color: var(--muted);
            font-size: 0.85em;
            margin-left: 2px;
        }

        .draft-gutter .aq-zone::before { content: '→'; margin-right: 1px; opacity: 0.6; }

        .draft-body textarea {
            flex: 1;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            color: var(--bone);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            line-height: 1.75;
            padding: 12px 14px;
        }

        .draft-body textarea::placeholder { color: var(--muted); font-style: italic; }

        .draft.form-mode { width: 460px; height: min(560px, calc(100% - 40px)); }

        .draft-mode-btn {
            background: transparent;
            border: 1px solid var(--hairline);
            color: var(--muted);
            padding: 3px 9px;
            cursor: pointer;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-right: 8px;
        }

        .draft-mode-btn:hover { color: var(--bone); border-color: var(--hairline-strong); }

        /* Form template */
        .template-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px 20px;
        }

        .t-stanza { margin-bottom: 18px; }

        .t-stanza-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .t-line {
            display: flex;
            align-items: center;
            gap: 7px;
            margin: 4px 0;
        }

        .t-syl {
            width: 34px;
            flex-shrink: 0;
            text-align: right;
            font-size: 0.62rem;
            color: var(--muted);
        }

        .t-syl.hit { color: var(--brass); }

        .t-body {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--hairline);
            color: var(--bone);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.98rem;
            padding: 3px 2px;
            outline: none;
        }

        .t-body:focus { border-bottom-color: var(--hairline-strong); }
        .t-body:disabled { color: var(--muted); font-style: italic; border-bottom-style: dotted; }

        .t-end {
            width: 78px;
            flex-shrink: 0;
            background: transparent;
            border: 1px solid;
            color: var(--bone);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.92rem;
            text-align: center;
            padding: 3px 4px;
            outline: none;
        }

        .t-end { transition: box-shadow 0.2s, border-color 0.2s; }
        .t-end:not(:disabled):hover { box-shadow: 0 0 0 1px var(--hairline-strong); }
        .t-end.armed { box-shadow: 0 0 0 1.5px var(--brass); }
        .t-end:disabled { opacity: 0.55; }

        .t-end.cA { border-color: rgba(179, 149, 84, 0.65); }
        .t-end.cB { border-color: rgba(111, 130, 168, 0.7); }
        .t-end.cC { border-color: rgba(125, 143, 122, 0.7); }
        .t-end.cD { border-color: rgba(143, 122, 146, 0.7); }
        .t-end.cE { border-color: rgba(168, 131, 111, 0.7); }
        .t-end.cF { border-color: rgba(158, 154, 138, 0.7); }
        .t-end.cG { border-color: rgba(194, 178, 138, 0.7); }

        .t-ref {
            font-size: 0.56rem;
            color: var(--brass);
            width: 20px;
            flex-shrink: 0;
        }

        .t-hint {
            font-size: 0.66rem;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .t-hint b { color: var(--brass); font-weight: 500; }

        /* Form modal */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(8, 7, 12, 0.75);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .modal {
            width: 420px;
            max-width: calc(100% - 40px);
            background: var(--surface);
            border: 1px solid var(--hairline-strong);
            padding: 26px 28px;
        }

        .modal h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7em;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .modal-glance {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .modal p {
            font-size: 0.88rem;
            line-height: 1.7;
            color: #cfc9bb;
            margin-bottom: 14px;
        }

        .modal-tip {
            border-left: 2px solid var(--brass);
            background: rgba(179, 149, 84, 0.07);
            padding: 10px 14px;
            font-size: 0.82rem;
            line-height: 1.6;
            color: #cfc9bb;
            margin-bottom: 18px;
        }

        .modal-actions { display: flex; align-items: baseline; gap: 18px; }

        .modal-actions button {
            background: transparent;
            border: 1px solid var(--brass);
            color: var(--brass);
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .modal-actions button:hover { color: #d4b877; border-color: #d4b877; }

        .modal-actions a {
            color: var(--muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-decoration: none;
        }

        .modal-actions a:hover { color: var(--bone); }
    </style>
</head>
<body>
    <header>
        <h1>Poetry Graph <span class="sub">— workspace</span></h1>
        <div class="toolbar">
            <div class="mode-toggle" id="modeToggle">
                <button data-mode="rhyme" class="active">Rhyme</button>
                <button data-mode="alliteration">Alliteration</button>
                <button data-mode="gematria">Numogram</button>
            </div>
            <button class="button primary" id="addWordBtn">＋ Add Word</button>
            <button class="button" id="draftBtn">Draft</button>
            <button class="button" id="newPoemBtn">New Poem</button>
            <a href="read.html">Read</a>
            <a href="forms.html">Forms</a>
            <a href="index.html">Explorer</a>
        </div>
    </header>

    <main>
        <div id="graph3d"></div>

        <div class="panel" id="panel" style="display: none;">
            <div class="panel-header drag-handle">
                <h2 id="panelTitle">Add a word</h2>
                <div class="header-btns">
                    <button class="collapse-btn" data-collapse="panel">–</button>
                    <button class="panel-close" id="panelClose">✕</button>
                </div>
            </div>
            <div class="panel-body" id="panelBody"></div>
        </div>

        <div class="forces" id="forces" style="display: none;">
            <div class="forces-header drag-handle">
                <h3>Connection Forces</h3>
                <button class="collapse-btn" data-collapse="forces">–</button>
            </div>
            <div id="forceRows"></div>
            <div class="hint">Sliders set how strongly each relationship pulls words together. Drag words · scroll to zoom · right-drag to pan.</div>
        </div>

        <div class="draft" id="draft" style="display: none;">
            <div class="draft-header drag-handle">
                <h3 id="draftTitle">Draft <span class="draft-note" id="draftNote">syllables count themselves</span></h3>
                <div class="header-btns">
                    <button class="draft-mode-btn" id="formClearBtn" style="display: none;">free draft</button>
                    <button class="collapse-btn" data-collapse="draft">–</button>
                    <button class="panel-close" id="draftClose">✕</button>
                </div>
            </div>
            <div class="draft-body" id="freeDraft">
                <div class="draft-gutter" id="draftGutter"></div>
                <textarea id="draftText" placeholder="write here…" spellcheck="false"></textarea>
            </div>
            <div class="template-wrap" id="templateWrap" style="display: none;"></div>
        </div>

        <div class="modal-overlay" id="formModal" style="display: none;">
            <div class="modal">
                <h2 id="modalTitle"></h2>
                <div class="modal-glance" id="modalGlance"></div>
                <p id="modalBody"></p>
                <div class="modal-tip" id="modalTip"></div>
                <div class="modal-actions">
                    <button id="modalBegin">begin gathering</button>
                    <a id="modalGuide" href="forms.html">full guide</a>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="workspace.js?v=13"></script>
</body>
</html>
