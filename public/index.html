<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1em;
            opacity: 0.9;
        }

        main {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .graph-container {
            flex: 1;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .node {
            cursor: pointer;
            stroke: white;
            stroke-width: 2px;
        }

        .node:hover {
            stroke-width: 3px;
        }

        .node.selected {
            stroke: #ffd700;
            stroke-width: 3px;
        }

        .link {
            stroke: #999;
            stroke-opacity: 0.3;
            stroke-width: 1px;
        }

        .node-label {
            pointer-events: none;
            font-size: 12px;
            font-weight: bold;
            text-anchor: middle;
            dy: '0.3em';
            fill: white;
        }

        .sidebar {
            width: 350px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 1em;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .word-section {
            margin-bottom: 25px;
        }

        .word-section h3 {
            color: #764ba2;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .word-list {
            list-style: none;
        }

        .word-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #f5f5f5;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .word-item:hover {
            background: #e8e8ff;
            border-left-color: #667eea;
        }

        .word-item.highlight {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }

        .similarity-score {
            font-size: 0.85em;
            opacity: 0.7;
            float: right;
        }

        .poem-section {
            border-top: 2px solid #667eea;
            padding-top: 15px;
            margin-top: 20px;
        }

        .poem-section h3 {
            color: #764ba2;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .poem-text {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            line-height: 1.8;
            font-style: italic;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
        }

        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        @media (max-width: 1000px) {
            main {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌙 Poetry Graph</h1>
        <p class="subtitle">Map semantic and phonetic relationships between words</p>
    </header>

    <main>
        <div class="graph-container">
            <svg id="graph"></svg>
        </div>

        <div class="sidebar">
            <div class="sidebar-content">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search or add words...">
                </div>

                <div class="word-section">
                    <h3>Available Words</h3>
                    <ul id="wordList" class="word-list"></ul>
                </div>

                <div class="word-section">
                    <h3>Rhymes for Selected</h3>
                    <ul id="rhymeList" class="word-list"></ul>
                </div>

                <div class="word-section">
                    <h3>Similar Words</h3>
                    <ul id="similarList" class="word-list"></ul>
                </div>

                <button class="button" id="poemBtn">Generate Poem</button>
                <button class="button" id="resetBtn">Reset Graph</button>

                <div class="poem-section" id="poemSection" style="display: none;">
                    <h3>Generated Poem</h3>
                    <div class="poem-text" id="poemText"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
