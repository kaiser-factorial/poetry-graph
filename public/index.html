<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        h1, h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; }

        input, select {
            background: #1c1b23 !important;
            color: #e8e2d3 !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif; color: #e8e2d3;
            background: #0c0b10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1em;
            opacity: 0.9;
        }

        main {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .graph-container {
            flex: 1;
            background: #14131a; border: 1px solid rgba(232,226,211,0.14);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .node {
            cursor: pointer;
            stroke: #e8e2d3;
            stroke-width: 2px;
        }

        .node:hover {
            stroke-width: 3px;
        }

        .node.selected {
            stroke: #b39554;
            stroke-width: 3px;
        }

        .link {
            stroke: #999;
            stroke-opacity: 0.3;
            stroke-width: 1px;
        }

        .node-label {
            pointer-events: none;
            font-size: 12px;
            font-weight: bold;
            text-anchor: middle;
            dy: '0.3em';
            fill: white;
        }

        .sidebar {
            width: 350px;
            background: #14131a; border: 1px solid rgba(232,226,211,0.14);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar h2 {
            color: #b39554;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 2px solid #b39554;
            border-radius: 5px;
            font-size: 1em;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(179, 149, 84, 0.5);
        }

        .word-section {
            margin-bottom: 25px;
        }

        .word-section h3 {
            color: #8f897c;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #b39554;
            padding-bottom: 8px;
        }

        .word-list {
            list-style: none;
        }

        .word-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #1c1b23;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .word-item:hover {
            background: #242230;
            border-left-color: #b39554;
        }

        .word-item.highlight {
            background: #b39554;
            color: white;
            border-left-color: #8f897c;
        }

        .similarity-score {
            font-size: 0.85em;
            opacity: 0.7;
            float: right;
        }

        .poem-section {
            border-top: 2px solid #b39554;
            padding-top: 15px;
            margin-top: 20px;
        }

        .poem-section h3 {
            color: #8f897c;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .poem-text {
            background: #1c1b23;
            padding: 15px;
            border-radius: 5px;
            line-height: 1.8;
            font-style: italic;
            color: #e8e2d3;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
        }

        .button {
            background: #b39554;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .button:hover {
            background: #8f897c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(179, 149, 84, 0.4);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #b39554;
        }

        @media (max-width: 1000px) {
            main {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Poetry Graph</h1>
        <p class="subtitle" style="color: #8f897c; font-style: italic;">map semantic and phonetic relationships between words</p>
        <a href="workspace.html" style="display: inline-block; margin-top: 12px; color: #e8e2d3; text-decoration: none; padding: 7px 18px; border: 1px solid rgba(232,226,211,0.3); font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.14em;">Start a New Poem</a>
    </header>

    <main>
        <div class="graph-container">
            <svg id="graph"></svg>
        </div>

        <div class="sidebar">
            <div class="sidebar-content">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search or add words...">
                    <small style="color: #8f897c; display: block; margin-top: 5px;">Separate words with commas or spaces</small>
                </div>

                <div class="word-section" id="statsSection" style="background: #1c1b23; padding: 12px; border-radius: 5px; margin-bottom: 15px;">
                    <h3 style="font-size: 0.9em; margin-bottom: 8px;">Graph Stats</h3>
                    <div style="font-size: 0.85em; line-height: 1.6; color: #8f897c;">
                        <div>Words: <span id="wordCount">0</span></div>
                        <div>Connections: <span id="linkCount">0</span></div>
                        <div>Selected: <span id="selectedWord">None</span></div>
                    </div>
                </div>

                <div class="word-section">
                    <h3>Available Words</h3>
                    <ul id="wordList" class="word-list"></ul>
                </div>

                <div class="word-section">
                    <h3>Rhymes for Selected</h3>
                    <ul id="rhymeList" class="word-list"></ul>
                </div>

                <div class="word-section">
                    <h3>Similar Words</h3>
                    <ul id="similarList" class="word-list"></ul>
                </div>

                <div class="word-section">
                    <h3>Poem Type</h3>
                    <select id="poemStyleSelect" style="width: 100%; padding: 8px; border: 2px solid #b39554; border-radius: 5px; font-size: 0.9em;">
                        <option value="short">Short Verse</option>
                        <option value="verse">Verse</option>
                        <option value="haiku">Haiku (5-7-5)</option>
                        <option value="limerick">Limerick (AABBA)</option>
                        <option value="couplets">Couplets</option>
                        <option value="stanza">Stanza</option>
                        <option value="sonnet">Sonnet (14 lines)</option>
                        <option value="sestina">Sestina (complex)</option>
                        <option value="ballad">Ballad (narrative)</option>
                        <option value="free-verse">Free Verse</option>
                        <option value="acrostic">Acrostic</option>
                        <option value="triolet">Triolet</option>
                        <option value="villanelle">Villanelle</option>
                        <option value="long">Long Form</option>
                    </select>
                </div>

                <button class="button" id="poemBtn">✨ Generate Poem</button>
                <button class="button" id="resetBtn">↻ Reset Graph</button>

                <div class="poem-section" id="poemSection" style="display: none;">
                    <h3>Generated Poem</h3>
                    <div class="poem-text" id="poemText"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
